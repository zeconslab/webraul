<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin — pimentel.cloud</title>

    <!-- Aplica el tema ANTES del primer render para evitar flash -->
    <script>
    (function(){
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    })();
    </script>

    <style>
    /* ── Reset & tokens ─────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    /* Light mode (default) */
    :root{
        --bg:       #F0F4F8;
        --surface:  #FFFFFF;
        --surface2: #F1F5F9;
        --border:   rgba(15,23,42,.1);
        --border-focus: rgba(74,158,255,.5);
        --text:     #0F172A;
        --muted:    #64748B;
        --primary:  #2563EB;
        --accent:   #00C896;
        --danger:   #DC2626;
        --glow:     rgba(37,99,235,.08);
    }
    /* Dark mode */
    html.dark{
        --bg:       #070B14;
        --surface:  #0F172A;
        --surface2: #1E293B;
        --border:   rgba(74,158,255,.12);
        --border-focus: rgba(74,158,255,.5);
        --text:     #E4ECF5;
        --muted:    #64748B;
        --primary:  #4A9EFF;
        --accent:   #00D9A3;
        --danger:   #EF4444;
        --glow:     rgba(74,158,255,.15);
    }
    html,body{height:100%}
    body{
        background:var(--bg);
        color:var(--text);
        font-family:'Fira Code','Fira Mono','Cascadia Code','Consolas',ui-monospace,monospace;
        display:flex;
        align-items:center;
        justify-content:center;
        min-height:100dvh;
        padding:1.5rem;
    }

    /* ── Grid bg (decorativo) ── */
    body::before{
        content:'';
        position:fixed;inset:0;
        background-image:
            linear-gradient(var(--grid-line) 1px,transparent 1px),
            linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
        background-size:40px 40px;
        pointer-events:none;
        z-index:0;
    }
    :root{ --grid-line: rgba(15,23,42,.05); }
    html.dark{ --grid-line: rgba(74,158,255,.04); }

    /* ── Glow blob ─────────────────────────────────────── */
    .blob{
        position:fixed;top:-20%;left:50%;
        transform:translateX(-50%);
        width:600px;height:400px;
        background:radial-gradient(ellipse,var(--glow) 0%,transparent 70%);
        pointer-events:none;z-index:0;
    }

    /* ── Card ─────────────────────────────────────────── */
    .card{
        position:relative;z-index:1;
        width:100%;max-width:400px;
        background:var(--surface);
        border:1px solid var(--border);
        border-radius:1.25rem;
        padding:2.5rem 2rem;
        box-shadow:
            0 0 0 1px rgba(74,158,255,.05),
            0 24px 64px rgba(0,0,0,.6),
            0 0 80px rgba(74,158,255,.04);
    }

    /* ── Header ───────────────────────────────────────── */
    .logo{
        display:flex;align-items:center;gap:.75rem;
        margin-bottom:2rem;
    }
    .logo-icon{
        width:2.25rem;height:2.25rem;
        background:rgba(74,158,255,.1);
        border:1px solid rgba(74,158,255,.2);
        border-radius:.5rem;
        display:flex;align-items:center;justify-content:center;
        font-size:.75rem;font-weight:700;color:var(--primary);
        letter-spacing:-.02em;
    }
    .logo-text{font-size:.9rem;font-weight:600;color:var(--primary)}
    .logo-badge{
        margin-left:auto;
        font-size:.6rem;font-weight:600;
        padding:.2rem .5rem;
        border-radius:.25rem;
        background:rgba(0,217,163,.1);
        color:var(--accent);
        border:1px solid rgba(0,217,163,.2);
        text-transform:uppercase;letter-spacing:.06em;
    }

    .title{font-size:1.25rem;font-weight:700;color:var(--text);margin-bottom:.375rem}
    .subtitle{font-size:.8rem;color:var(--muted);margin-bottom:2rem;line-height:1.5}

    /* ── Form ─────────────────────────────────────────── */
    .form-group{margin-bottom:1.25rem}
    label{
        display:block;
        font-size:.7rem;font-weight:600;
        color:var(--muted);
        text-transform:uppercase;letter-spacing:.08em;
        margin-bottom:.5rem;
    }
    .input-wrap{position:relative}
    .input-icon{
        position:absolute;left:.875rem;top:50%;transform:translateY(-50%);
        width:1rem;height:1rem;color:var(--muted);pointer-events:none;
        display:flex;align-items:center;justify-content:center;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"]{
        width:100%;
        background:var(--surface2);
        border:1px solid var(--border);
        border-radius:.625rem;
        padding:.75rem .875rem .75rem 2.625rem;
        color:var(--text);
        font-family:inherit;font-size:.875rem;
        outline:none;
        transition:border-color .2s,box-shadow .2s;
        -webkit-appearance:none;
    }
    input:focus{
        border-color:var(--border-focus);
        box-shadow:0 0 0 3px rgba(74,158,255,.1);
    }
    input::placeholder{color:var(--muted);opacity:.6}

    /* password toggle */
    .toggle-pass{
        position:absolute;right:.875rem;top:50%;transform:translateY(-50%);
        background:none;border:none;cursor:pointer;
        color:var(--muted);padding:.25rem;
        display:flex;align-items:center;justify-content:center;
        border-radius:.375rem;transition:color .15s;
    }
    .toggle-pass:hover{color:var(--primary)}
    .toggle-pass svg{width:1rem;height:1rem}

    /* ── Helper row ────────────────────────────────────── */
    .helper-row{
        display:flex;align-items:center;justify-content:space-between;
        margin-bottom:1.75rem;
        font-size:.75rem;color:var(--muted);
        line-height:1;
    }
    .check-wrap{
        display:flex;align-items:center;gap:.5rem;
        cursor:pointer;line-height:1;
    }
    .check-wrap input[type="checkbox"]{
        width:1rem;height:1rem;flex-shrink:0;
        accent-color:var(--primary);
        margin:0;padding:0;
        vertical-align:middle;
        cursor:pointer;
    }
    .check-wrap span{vertical-align:middle;line-height:1}
    .forgot{
        color:var(--primary);text-decoration:none;
        font-size:.75rem;line-height:1;
        vertical-align:middle;
        transition:opacity .15s;
    }
    .forgot:hover{opacity:.7}

    /* ── Submit ────────────────────────────────────────── */
    .btn-login{
        width:100%;padding:.875rem;
        background:linear-gradient(135deg,var(--primary) 0%,#2563EB 100%);
        border:none;border-radius:.625rem;
        color:#fff;font-family:inherit;font-size:.875rem;font-weight:600;
        cursor:pointer;
        display:flex;align-items:center;justify-content:center;gap:.5rem;
        transition:opacity .2s,transform .15s,box-shadow .2s;
        box-shadow:0 4px 20px rgba(74,158,255,.25);
        letter-spacing:.02em;
    }
    .btn-login:hover{opacity:.9;box-shadow:0 6px 28px rgba(74,158,255,.35)}
    .btn-login:active{transform:scale(.98)}
    .btn-login svg{width:1rem;height:1rem}
    .btn-login.loading{opacity:.7;pointer-events:none}

    /* ── Error banner ──────────────────────────────────── */
    .error-banner{
        display:none;
        background:rgba(239,68,68,.08);
        border:1px solid rgba(239,68,68,.25);
        border-radius:.625rem;
        padding:.75rem 1rem;
        margin-bottom:1.25rem;
        font-size:.78rem;color:var(--danger);
        align-items:center;gap:.5rem;
    }
    .error-banner.visible{display:flex}
    .error-banner svg{width:1rem;height:1rem;flex-shrink:0}

    /* ── Divider ───────────────────────────────────────── */
    .divider{
        border:none;border-top:1px solid var(--border);
        margin:1.75rem 0 1.25rem;
    }

    /* ── Footer ────────────────────────────────────────── */
    .back-link{
        display:flex;align-items:center;justify-content:center;gap:.375rem;
        font-size:.75rem;color:var(--muted);text-decoration:none;
        transition:color .15s;
    }
    .back-link:hover{color:var(--primary)}
    .back-link svg{width:.875rem;height:.875rem}

    /* ── Focus visible ─────────────────────────────────── */
    :focus-visible{outline:2px solid var(--primary);outline-offset:2px}
    </style>
</head>
<body>

<div class="blob" aria-hidden="true"></div>

<main class="card" role="main">

    <!-- Logo -->
    <div class="logo">
        <div class="logo-icon">&gt;_</div>
        <span class="logo-text">raul.dev</span>
        <span class="logo-badge">Admin</span>
    </div>

    <h1 class="title">Acceso administrativo</h1>
    <p class="subtitle">Ingresa tus credenciales para gestionar el portfolio.</p>

    <!-- Error banner (se activa por JS) -->
    <div class="error-banner" id="errorBanner" role="alert" aria-live="polite">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5" fill="currentColor"/>
        </svg>
        <span id="errorMsg">Credenciales incorrectas. Inténtalo de nuevo.</span>
    </div>

    <form id="loginForm" novalidate>

        <!-- Email -->
        <div class="form-group">
            <label for="email">Email</label>
            <div class="input-wrap">
                <span class="input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" width="16" height="16">
                        <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
                    </svg>
                </span>
                <input
                    type="email" id="email" name="email"
                    placeholder="admin@pimentel.cloud"
                    autocomplete="username email"
                    required
                    aria-describedby="errorBanner"
                />
            </div>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="input-wrap">
                <span class="input-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" width="16" height="16">
                        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </span>
                <input
                    type="password" id="password" name="password"
                    placeholder="••••••••"
                    autocomplete="current-password"
                    required
                    aria-describedby="errorBanner"
                />
                <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostrar contraseña">
                    <!-- eye icon -->
                    <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg id="eyeClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true" style="display:none">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Recordar + olvidé -->
        <div class="helper-row">
            <label class="check-wrap">
                <input type="checkbox" id="remember" name="remember" />
                <span>Mantener sesión</span>
            </label>
            <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-login" id="submitBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Iniciar sesión
        </button>

    </form>

    <hr class="divider" />

    <!-- Volver al portfolio -->
    <a href="/" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"/>
        </svg>
        Volver a pimentel.cloud
    </a>

</main>

<script>
(function () {
    /* Toggle password visibility */
    const toggleBtn = document.getElementById('togglePass');
    const pwdInput  = document.getElementById('password');
    const eyeOpen   = document.getElementById('eyeOpen');
    const eyeClosed = document.getElementById('eyeClosed');

    toggleBtn.addEventListener('click', function () {
        const isHidden = pwdInput.type === 'password';
        pwdInput.type = isHidden ? 'text' : 'password';
        eyeOpen.style.display  = isHidden ? 'none' : '';
        eyeClosed.style.display = isHidden ? '' : 'none';
        toggleBtn.setAttribute('aria-label', isHidden ? 'Ocultar contraseña' : 'Mostrar contraseña');
    });

    /* Form submit — mock (muestra error de placeholder) */
    const form       = document.getElementById('loginForm');
    const submitBtn  = document.getElementById('submitBtn');
    const errorBanner = document.getElementById('errorBanner');
    const errorMsg   = document.getElementById('errorMsg');

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        errorBanner.classList.remove('visible');

        const email = document.getElementById('email').value.trim();
        const pwd   = document.getElementById('password').value;

        if (!email || !pwd) {
            errorMsg.textContent = 'Por favor completa todos los campos.';
            errorBanner.classList.add('visible');
            return;
        }

        /* Simula carga */
        submitBtn.classList.add('loading');
        submitBtn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin .7s linear infinite" aria-hidden="true">
                <path d="M21 12a9 9 0 1 1-6.22-8.56" stroke-linecap="round"/>
            </svg>
            Verificando…`;

        setTimeout(function () {
            submitBtn.classList.remove('loading');
            submitBtn.innerHTML = `
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
                Iniciar sesión`;
            errorMsg.textContent = 'Backend no configurado aún. Este es el mock de UI.';
            errorBanner.classList.add('visible');
        }, 1400);
    });

    /* Spin keyframe para el spinner */
    const style = document.createElement('style');
    style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
    document.head.appendChild(style);
})();
</script>
</body>
</html>
